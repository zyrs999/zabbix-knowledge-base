name: 自动更新Zabbix全网中文知识库

# 触发规则：每周日凌晨1点自动运行 + 支持手动触发
on:
  schedule:
    - cron: '0 1 * * 0'  # 时区UTC，对应国内早上9点
  workflow_dispatch:     # 手动触发开关
permissions:
  contents: write  # 给workflow写权限，允许提交代码

jobs:
  crawl_and_update:
    runs-on: ubuntu-latest  # 使用GitHub的云端服务器运行
    steps:
      # 步骤1：拉取仓库代码到云端服务器
      - name: 拉取GitHub仓库代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # 使用内置token授权

      # 步骤2：配置Python环境
      - name: 设置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 步骤3：安装爬虫依赖
      - name: 安装requests和BeautifulSoup4
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4

      # 步骤4：运行爬虫脚本，生成最新知识库
      - name: 爬取Zabbix全网中文资料
        run: python crawl_all.py

      # 步骤5：提交更新到GitHub仓库
      - name: 自动提交更新到云端
        run: |
          git config --global user.name "GitHub Actions Auto Bot"
          git config --global user.email "actions@github.com"
          # 检查文件是否有变化，无变化则跳过提交
          git add zabbix_knowledge_all.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🚀 自动更新Zabbix知识库 $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 传递token给git push
